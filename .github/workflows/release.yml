name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    env:
      GO_VERSION: "1.24"
      GOCACHE: ${{ github.workspace }}/.gocache
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Prepare release metadata
        id: prep
        run: |
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.image }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build release archives
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          for target in \
            "linux amd64 tar.gz" \
            "linux arm64 tar.gz" \
            "darwin amd64 tar.gz" \
            "darwin arm64 tar.gz" \
            "windows amd64 zip"
          do
            set -- $target
            GOOS="$1"
            GOARCH="$2"
            ARCHIVE_KIND="$3"
            BASENAME="yrestapi_${VERSION#v}_${GOOS}_${GOARCH}"
            BIN_NAME="yrestapi"
            if [ "$GOOS" = "windows" ]; then
              BIN_NAME="yrestapi.exe"
            fi
            OUT_DIR="dist/$BASENAME"
            mkdir -p "$OUT_DIR"
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
              go build -trimpath -ldflags="-s -w" -o "$OUT_DIR/$BIN_NAME" ./cmd
            cp README.md LICENSE.txt CHANGELOG.md "$OUT_DIR/"
            if [ "$ARCHIVE_KIND" = "zip" ]; then
              (
                cd dist
                zip -rq "$BASENAME.zip" "$BASENAME"
              )
              rm -rf "$OUT_DIR"
            else
              tar -C dist -czf "dist/$BASENAME.tar.gz" "$BASENAME"
              rm -rf "$OUT_DIR"
            fi
          done
          (
            cd dist
            sha256sum *.tar.gz *.zip > checksums.txt
          )

      - name: Extract release notes from CHANGELOG
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION_NO_V="${VERSION#v}"
          awk '
            $0 ~ "^## \\[" version "\\]" { capture=1; next }
            capture && $0 ~ "^## \\[" { exit }
            capture { print }
          ' version="$VERSION_NO_V" CHANGELOG.md | sed '/./,$!d' > dist/release-notes.md
          if [ ! -s dist/release-notes.md ]; then
            echo "No CHANGELOG section found for $VERSION" >&2
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: dist/release-notes.md
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
